<div class="h-screen flex overflow-hidden bg-gray-50 relative">

  @if (isSidebarOpen()) {
    <div (click)="closeSidebar()" class="fixed inset-0 bg-gray-900/50 z-20 md:hidden transition-opacity"></div>
  }

  <nav class="absolute md:relative inset-y-0 left-0 z-30 w-64 bg-blue-900 text-white flex flex-col transform transition-transform duration-300 ease-in-out"
       [class.-translate-x-full]="!isSidebarOpen()"
       [class.md:translate-x-0]="true">
    
    <div class="h-16 flex items-center px-6 bg-blue-950 border-b border-blue-800 justify-between">
      <div class="flex items-center">
        <div class="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center mr-3">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <span class="text-lg font-bold tracking-wider">Admin Panel</span>
      </div>
      <button (click)="closeSidebar()" class="md:hidden text-gray-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto py-4">
      <ul class="space-y-1 px-3">
        <li>
          <a routerLink="/admin/dashboard" routerLinkActive="bg-blue-800 border-l-4 border-amber-500 text-white" (click)="closeSidebar()"
             class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-blue-800 hover:text-white transition-colors">
            <svg class="w-5 h-5 mr-3 text-blue-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
            Tablero Principal
          </a>
        </li>
        <li>
          <a routerLink="/admin/talleres" routerLinkActive="bg-blue-800 border-l-4 border-amber-500 text-white" (click)="closeSidebar()" [routerLinkActiveOptions]="{exact: true}"
             class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-blue-800 hover:text-white transition-colors">
            <svg class="w-5 h-5 mr-3 text-blue-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
            Talleres Mecánicos
          </a>
        </li>
        <li>
          <a routerLink="/admin/clientes" routerLinkActive="bg-blue-800 border-l-4 border-amber-500 text-white" (click)="closeSidebar()" [routerLinkActiveOptions]="{exact: true}"
             class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-blue-800 hover:text-white transition-colors">
            <svg class="w-5 h-5 mr-3 text-blue-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            Gestión de Clientes
          </a>
        </li>
        <li>
          <a routerLink="/admin/finanzas" routerLinkActive="bg-blue-800 border-l-4 border-amber-500 text-white" 
            class="flex items-center px-3 py-2.5 rounded-lg text-sm font-medium text-blue-100 hover:bg-blue-800 hover:text-white transition-colors mt-1">
            <svg class="w-5 h-5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Finanzas
          </a>
        </li>
      </ul>
    </div>

    

    <div class="p-4 border-t border-blue-800">
      <button (click)="cerrarSesion()" class="flex items-center w-full px-3 py-2 text-sm font-medium text-blue-200 hover:text-white transition-colors">
        <svg class="w-5 h-5 mr-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Cerrar Sesión
      </button>
    </div>
  </nav>

  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    
    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-4 sm:px-8 z-10">
      <div class="flex items-center">
        <button (click)="toggleSidebar()" class="mr-4 text-gray-500 focus:outline-none md:hidden hover:text-blue-700 transition-colors">
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h2 class="text-xl font-semibold text-gray-800 truncate">Bienvenido, Admin</h2>
      </div>
      
      <div class="flex items-center space-x-4">
        <button class="text-gray-400 hover:text-amber-500 transition-colors relative">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
          <span class="absolute top-0 right-0 block h-2.5 w-2.5 rounded-full bg-red-600 ring-2 ring-white"></span>
        </button>
        <div class="h-9 w-9 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold border border-blue-200">A</div>
      </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-4 sm:p-8">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
