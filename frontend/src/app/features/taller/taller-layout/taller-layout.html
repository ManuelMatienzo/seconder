<div class="flex min-h-screen bg-gray-50 font-sans">
  
  @if (isMobileMenuOpen()) {
    <div (click)="cerrarMenu()" class="fixed inset-0 bg-gray-900/50 z-40 lg:hidden transition-opacity flex-shrink-0"></div>
  }

  <aside class="fixed inset-y-0 left-0 z-50 w-60 bg-white border-r-[1.5px] border-gray-200 flex flex-col flex-shrink-0 transform transition-transform duration-300 ease-in-out lg:relative lg:translate-x-0"
         [class.-translate-x-full]="!isMobileMenuOpen()">
    
    <div class="p-4 border-b-[1.5px] border-gray-200">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center flex-shrink-0 shadow-sm">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </div>
        <div class="font-mono text-xs font-bold text-gray-900 leading-tight">
          EMERGENCIAS
          <span class="block text-[9px] text-amber-500 tracking-widest mt-0.5">VEHICULARES</span>
        </div>
      </div>
    </div>
    
    <nav class="flex-1 p-3 space-y-1 overflow-y-auto">
      <div class="px-3 py-2 font-mono text-[9px] font-bold tracking-widest text-gray-400 uppercase">
        Panel Operativo
      </div>
      
      <a routerLink="/taller/dashboard" routerLinkActive="text-blue-700 bg-blue-50 border-l-2 border-blue-700 rounded-r-lg" (click)="cerrarMenu()"
         class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-colors">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        Recepción Activa
      </a>

      <a routerLink="/taller/historial" routerLinkActive="text-blue-700 bg-blue-50 border-l-2 border-blue-700 rounded-r-lg" (click)="cerrarMenu()"
         class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-colors mt-1">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
        Historial de Servicios
      </a>

      <a routerLink="/taller/recursos" routerLinkActive="text-blue-700 bg-blue-50 border-l-2 border-blue-700 rounded-r-lg" (click)="cerrarMenu()"
        class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-colors mt-1">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        Gestión de Recursos
      </a>

      <a routerLink="/taller/ubicacion" routerLinkActive="text-blue-700 bg-blue-50 border-l-2 border-blue-700 rounded-r-lg" (click)="cerrarMenu()"
        class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg transition-colors mt-1">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Ubicación GPS
      </a>
    </nav>
    
    <div class="p-4 border-t-[1.5px] border-gray-200">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-9 h-9 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-semibold text-sm flex-shrink-0 border-2 border-white shadow-sm">
          {{ userInitials }}
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-gray-900 truncate">{{ userName }}</p>
          <p class="text-xs text-gray-500 truncate">{{ userEmail }}</p>
        </div>
      </div>
      <button (click)="cerrarSesion()" class="w-full px-4 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 border-[1.5px] border-gray-200 rounded-lg font-semibold text-sm transition-colors flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Desconectar
      </button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col min-w-0">
    
    <header class="h-14 bg-white border-b-[1.5px] border-gray-100 px-4 lg:px-6 flex items-center justify-between flex-shrink-0">
      
      <div class="flex items-center gap-4">
        <button (click)="toggleMenu()" class="lg:hidden p-1 -ml-1 text-gray-600 hover:bg-gray-100 rounded-md transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <h1 class="font-mono text-xs font-bold tracking-widest text-gray-900 uppercase">RECEPCIÓN</h1>
        <div class="h-4 w-[1px] bg-gray-300 mx-1 hidden sm:block"></div>
        <span class="text-sm font-bold text-blue-700 hidden sm:block">{{ userName }}</span>
      </div>

      <div class="flex items-center gap-4">
        <div class="hidden sm:flex items-center gap-2">
          <span class="relative flex h-2.5 w-2.5 flex-shrink-0">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
          </span>
          <span class="text-xs font-medium text-gray-600">Conectado a la Red</span>
        </div>
      </div>
    </header>
    
    <div class="flex-1 p-4 lg:p-6 overflow-y-auto">
      <router-outlet></router-outlet>
    </div>

  </main>
</div>
